<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>تطبيق حساب الذهب الفاخر</title>
    <!-- ربط ملف التنسيق الخارجي -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="error-toast">مدخلات غير صحيحة</div>

    <header>
        <h1 id="appTitle">تطبيق الذهب الفاخر</h1>
        <button class="lang-btn" onclick="toggleLanguage()" id="langToggle">English</button>
    </header>

    <div class="app-container">
        <!-- اللوحة الأولى -->
        <div class="panel">
            <h2 id="panel1Title">حاسبة التجزئة</h2>
            <div class="form-group">
                <label id="lblPrice">سعر الذهب (للجرام)</label>
                <input type="number" id="p1_price" inputmode="decimal" placeholder="0.00" oninput="validateAndCalculate(this, calculateRetail)">
            </div>
            <div class="form-group">
                <label id="lblWeight">الوزن (بالجرام)</label>
                <input type="number" id="p1_weight" inputmode="decimal" placeholder="0.00" oninput="validateAndCalculate(this, calculateRetail)">
            </div>
            <div class="form-group">
                <label id="lblMaking">المصنعية (للجرام)</label>
                <input type="number" id="p1_making" inputmode="decimal" placeholder="0.00" oninput="validateAndCalculate(this, calculateRetail)">
            </div>
            <div class="divider"></div>
            <div class="form-group"><label id="lblTotalGold">إجمالي سعر الذهب</label><input type="text" id="p1_out_gold" readonly></div>
            <div class="form-group"><label id="lblTotalMaking">إجمالي المصنعية</label><input type="text" id="p1_out_making" readonly></div>
            <div class="form-group"><label id="lblTax">الضريبة (5%)</label><input type="text" id="p1_out_tax" readonly></div>
            <div class="form-group total-row"><label id="lblGrandTotal">المبلغ الإجمالي</label><input type="text" id="p1_out_total" readonly></div>
        </div>

        <!-- اللوحة الثانية -->
        <div class="panel">
            <h2 id="panel2Title">أسعار السوق</h2>
            <div class="form-group">
                <label id="lblMarketPrice">سعر السوق العالمي</label>
                <input type="number" id="p2_market" inputmode="decimal" placeholder="0.00" oninput="validateAndCalculate(this, calculateMarket)">
            </div>
            <div class="divider"></div>
            <div class="form-group"><label id="lbl24k">سعر عيار 24</label><input type="text" id="p2_out_24k" readonly></div>
            <div class="form-group"><label id="lbl22k">سعر عيار 22</label><input type="text" id="p2_out_22k" readonly></div>
            <div class="form-group"><label id="lbl21k">سعر عيار 21</label><input type="text" id="p2_out_21k" readonly></div>
            <div class="form-group"><label id="lbl18k">سعر عيار 18</label><input type="text" id="p2_out_18k" readonly></div>
        </div>
    </div>

    <!-- ربط ملف الجافا سكريبت الخارجي -->
    <script src="script.js"></script>
</body>
</html>
